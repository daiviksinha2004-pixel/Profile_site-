# Optional: one-command local stack. Run `docker compose up --build`.
# For day-to-day dev the README's native run (uvicorn + npm) is simpler/faster.
# This file is here so recruiters see you can containerize a multi-service app.

services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    environment:
      # talk to the backend service over the compose network
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Uncomment to run Qdrant locally instead of embedded Chroma (set VECTOR_DB=qdrant in backend/.env)
